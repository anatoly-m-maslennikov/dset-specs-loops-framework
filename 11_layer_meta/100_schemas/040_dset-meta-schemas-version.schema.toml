"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/01_meta/schemas/version.schema.toml"
title = "DSET product version contract"
type = "object"
required = ["schema_version", "framework", "python_package", "schemas", "released_validator", "candidate_validator", "bootstrap"]
additionalProperties = false

[properties]

[properties.schema_version]

[[properties.schema_version.oneOf]]
enum = [1.0, 1.1]

[[properties.schema_version.oneOf]]
const = "1.2"

[properties.framework]

[[properties.framework.oneOf]]
"$ref" = "#/$defs/legacy_framework"

[[properties.framework.oneOf]]
"$ref" = "#/$defs/current_framework"

[properties.python_package]

[[properties.python_package.oneOf]]
"$ref" = "#/$defs/legacy_python_package"

[[properties.python_package.oneOf]]
"$ref" = "#/$defs/current_python_package"

[properties.schemas]
type = "object"
required = ["version", "versioning"]
additionalProperties = false

[properties.schemas.properties]

[properties.schemas.properties.version]
type = "string"

[properties.schemas.properties.versioning]
const = "independent"

[properties.released_validator]
"$ref" = "#/$defs/validator"

[properties.candidate_validator]
type = "object"
required = ["command"]
additionalProperties = false

[properties.candidate_validator.properties]

[properties.candidate_validator.properties.command]
type = "string"
minLength = 1

[properties.bootstrap]
type = "object"
required = ["manifest", "governance_registry", "precedence"]
additionalProperties = false

[properties.bootstrap.properties]

[properties.bootstrap.properties.manifest]
type = "string"
minLength = 1

[properties.bootstrap.properties.governance_registry]
type = "string"
minLength = 1

[properties.bootstrap.properties.precedence]
const = "project-local-rule-then-selected-local-profile-then-failure"

["$defs"]

["$defs".legacy_framework]
type = "object"
required = ["milestone", "status", "versioning"]
additionalProperties = false

["$defs".legacy_framework.properties]

["$defs".legacy_framework.properties.milestone]
const = "0.2"

["$defs".legacy_framework.properties.status]
enum = ["candidate", "released"]

["$defs".legacy_framework.properties.versioning]
const = "independent-framework-milestone"

["$defs".current_framework]
type = "object"
required = ["version", "versioning"]
additionalProperties = false

["$defs".current_framework.properties]

["$defs".current_framework.properties.version]
"$ref" = "#/$defs/semver"

["$defs".current_framework.properties.versioning]
const = "coordinated-product-package"

["$defs".legacy_python_package]
type = "object"
required = ["name", "version", "versioning"]
additionalProperties = false

["$defs".legacy_python_package.properties]

["$defs".legacy_python_package.properties.name]
const = "dset-spec-loops"

["$defs".legacy_python_package.properties.version]
"$ref" = "#/$defs/pep440"

["$defs".legacy_python_package.properties.versioning]
const = "independent"

["$defs".current_python_package]
type = "object"
required = ["name", "version", "versioning"]
additionalProperties = false

["$defs".current_python_package.properties]

["$defs".current_python_package.properties.name]
const = "dset-spec-loops"

["$defs".current_python_package.properties.version]
"$ref" = "#/$defs/pep440"

["$defs".current_python_package.properties.versioning]
const = "coordinated-product-package"

["$defs".semver]
type = "string"
pattern = "^(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)(?:-rc\\.[1-9][0-9]*)?$"

["$defs".pep440]
type = "string"
pattern = "^(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)(?:rc[1-9][0-9]*)?$"

["$defs".validator]
type = "object"
required = ["identity", "commit", "command"]
additionalProperties = false

["$defs".validator.properties]

["$defs".validator.properties.identity]
type = "string"
minLength = 1

["$defs".validator.properties.commit]
type = "string"
pattern = "^[0-9a-f]{40}$"

["$defs".validator.properties.command]
type = "string"
minLength = 1

["$defs".validator.properties.assurance]
enum = ["published-release", "bootstrap-transition"]

[["$defs".validator.allOf]]

["$defs".validator.allOf.if]
required = ["identity"]

["$defs".validator.allOf.if.properties]

["$defs".validator.allOf.if.properties.identity]
pattern = "not-release$"

["$defs".validator.allOf.then]
required = ["assurance"]

["$defs".validator.allOf.then.properties]

["$defs".validator.allOf.then.properties.assurance]
const = "bootstrap-transition"

[[allOf]]

[allOf.if]

[allOf.if.properties]

[allOf.if.properties.schema_version]
const = 1.0

[allOf.then]

[allOf.then.properties]

[allOf.then.properties.framework]
"$ref" = "#/$defs/legacy_framework"

[allOf.then.properties.python_package]
"$ref" = "#/$defs/legacy_python_package"

[allOf.else]

[allOf.else.properties]

[allOf.else.properties.framework]
"$ref" = "#/$defs/current_framework"

[allOf.else.properties.python_package]
"$ref" = "#/$defs/current_python_package"

[[allOf]]

[allOf.if]
required = ["schema_version"]

[allOf.if.properties]

[allOf.if.properties.schema_version]
const = "1.2"

[allOf.then]

[allOf.then.properties]

[allOf.then.properties.bootstrap]

[allOf.then.properties.bootstrap.properties]

[allOf.then.properties.bootstrap.properties.manifest]
enum = [".dset/dset_settings.toml", "dset/scopes/meta/dset.toml", "dset/scopes/meta/dset.yaml"]

[allOf.then.properties.bootstrap.properties.governance_registry]
enum = ["00_project/governance.toml", "dset/scopes/gov/governance.toml", "dset/scopes/gov/governance.yaml"]

[allOf.else]

[allOf.else.properties]

[allOf.else.properties.bootstrap]

[allOf.else.properties.bootstrap.properties]

[allOf.else.properties.bootstrap.properties.manifest]
enum = ["dset/dset.toml", "dset/dset.yaml"]

[allOf.else.properties.bootstrap.properties.governance_registry]
enum = ["dset/governance.toml", "dset/governance.yaml"]
