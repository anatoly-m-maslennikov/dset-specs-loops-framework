"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/01_meta/schemas/project.schema.toml"
title = "DSET project manifest"
type = "object"
required = ["schema_version", "project", "supportability", "structure", "packages", "profiles", "change_contract", "commit_provenance", "verification", "canonical_command"]
additionalProperties = false

[properties]

[properties.schema_version]

[[properties.schema_version.oneOf]]
enum = [1.0, 1.1]

[[properties.schema_version.oneOf]]
type = "string"
pattern = "^1\\.(?:0|1)-draft$"

[[properties.schema_version.oneOf]]
enum = ["1.2", "1.3", "1.4", "1.5", "1.6"]

[properties.artifacts]
type = "object"
required = ["creation_strictness", "routing"]
additionalProperties = false

[properties.artifacts.properties]

[properties.artifacts.properties.creation_strictness]
enum = ["medium", "high"]

[properties.artifacts.properties.routing]
type = "object"
required = ["revision_modes", "content_roles", "governance_loci"]
additionalProperties = false

[properties.artifacts.properties.routing.properties]

[properties.artifacts.properties.routing.properties.revision_modes]
type = "array"
minItems = 3
maxItems = 3
uniqueItems = true

[properties.artifacts.properties.routing.properties.revision_modes.items]
enum = ["atomic", "evergreen", "maintained"]

[properties.artifacts.properties.routing.properties.content_roles]
type = "array"
minItems = 6
maxItems = 6
uniqueItems = true

[properties.artifacts.properties.routing.properties.content_roles.items]
enum = ["inquiry", "definition", "rationale", "method", "implementation", "observation"]

[properties.artifacts.properties.routing.properties.governance_loci]
type = "array"
minItems = 1
maxItems = 3
uniqueItems = true

[properties.artifacts.properties.routing.properties.governance_loci.items]
enum = ["internal", "external", "relation"]

[properties.artifacts.properties.routing.properties.governance_loci.contains]
const = "internal"

[properties.workflows]
type = "object"

[properties.evergreen_views]
type = "object"
required = ["refresh_mode", "skill"]
additionalProperties = false

[properties.evergreen_views.properties]

[properties.evergreen_views.properties.refresh_mode]
const = "on_demand"

[properties.evergreen_views.properties.skill]
const = "dset-refresh"

[properties.changes]
type = "object"

[properties.delegation]
type = "object"

[properties.priority]
type = "object"

[properties.project]
type = "object"
required = ["key", "id", "name", "repository_slug", "repository_role"]
additionalProperties = false

[properties.project.properties]

[properties.project.properties.key]
type = "string"
pattern = "^[A-Z][A-Z0-9]*$"

[properties.project.properties.id]
"$ref" = "#/$defs/kebab"

[properties.project.properties.name]
type = "string"
minLength = 1

[properties.project.properties.repository_slug]
"$ref" = "#/$defs/kebab"

[properties.project.properties.repository_role]
type = "string"
minLength = 1

[properties.supportability]
type = "object"
required = ["status", "reason", "authority", "runbook"]
additionalProperties = false

[properties.supportability.properties]

[properties.supportability.properties.status]
enum = ["not-applicable", "applicable"]

[properties.supportability.properties.reason]
type = "string"
minLength = 1

[properties.supportability.properties.authority]
type = "string"
minLength = 1

[properties.supportability.properties.runbook]
type = "string"
minLength = 1

[properties.release]
type = "object"
required = ["status"]
additionalProperties = false

[properties.release.properties]

[properties.release.properties.status]
enum = ["not-applicable", "applicable"]

[properties.release.properties.integration_branch]
type = "string"
minLength = 1

[properties.release.properties.protected_branch]
type = "string"
minLength = 1

[properties.release.properties.publisher]
type = "string"
minLength = 1

[properties.release.properties.tag_pattern]
type = "string"
maxLength = 128
pattern = "^[A-Za-z0-9._/-]*\\{product_version\\}[A-Za-z0-9._/-]*$"

[properties.release.properties.reason]
type = "string"
minLength = 1

[[properties.release.allOf]]

[properties.release.allOf.if]

[properties.release.allOf.if.properties]

[properties.release.allOf.if.properties.status]
const = "applicable"

[properties.release.allOf.then]
required = ["integration_branch", "protected_branch", "publisher", "tag_pattern"]

[properties.release.allOf.else]
required = ["reason"]

[properties.work_items]
type = "object"
additionalProperties = false

[properties.work_items.properties]

[properties.work_items.properties.registry]
type = "string"
minLength = 1

[properties.work_items.properties.atomic_scopes]
type = "array"
minItems = 1
uniqueItems = true

[properties.work_items.properties.atomic_scopes.items]
type = "string"
minLength = 1

[[properties.work_items.oneOf]]
required = ["registry"]

[[properties.work_items.oneOf]]
required = ["atomic_scopes"]

[properties.contracts]
"$ref" = "#/$defs/contract_ids"

[properties.stories]
"$ref" = "#/$defs/story_ids"

[properties.outcomes]
"$ref" = "#/$defs/outcome_ids"

[properties.work_areas]
"$ref" = "#/$defs/work_areas"

[properties.structure]
type = "object"

[properties.packages]
type = "array"
minItems = 1

[properties.packages.items]
type = "object"

[properties.profiles]
type = "object"
required = ["runtime_risk", "durability_topology", "enforcement"]
additionalProperties = false

[properties.profiles.properties]

[properties.profiles.properties.runtime_risk]
type = "string"
minLength = 1

[properties.profiles.properties.durability_topology]
type = "string"
minLength = 1

[properties.profiles.properties.enforcement]
type = "string"
minLength = 1

[properties.profiles.properties.artifact]
type = ["string", "null"]
minLength = 1

[properties.profiles.properties.repository_governance]
type = ["string", "null"]
minLength = 1

[properties.profiles.properties.implementation]
type = "array"
uniqueItems = true

[properties.profiles.properties.implementation.items]
"$ref" = "#/$defs/implementation_profile_selection"

[properties.change_contract]
type = "object"

[properties.commit_provenance]
type = "object"
required = ["start_commit"]
additionalProperties = false

[properties.commit_provenance.properties]

[properties.commit_provenance.properties.start_commit]

[[properties.commit_provenance.properties.start_commit.oneOf]]
enum = ["root", "manifest-addition"]

[[properties.commit_provenance.properties.start_commit.oneOf]]
type = "string"
pattern = "^[0-9a-f]{40}$"

[properties.commit_provenance.properties.corrections]
type = "array"
uniqueItems = true

[properties.commit_provenance.properties.corrections.items]
"$ref" = "#/$defs/commit_provenance_correction"

[properties.verification]
type = "object"
required = ["commands"]
additionalProperties = false

[properties.verification.properties]

[properties.verification.properties.commands]
type = "array"
minItems = 1

[properties.verification.properties.commands.items]
type = "string"
minLength = 1

[properties.canonical_command]
type = "string"
minLength = 1

["$defs"]

["$defs".kebab]
type = "string"
pattern = "^[a-z0-9]+(?:-[a-z0-9]+)*$"

["$defs".layer]
enum = ["meta", "gov", "tool", "skill", "implementation", "ops"]

["$defs".implementation_profile_selection]
type = "object"
required = ["id", "version", "work_areas"]
additionalProperties = false

["$defs".implementation_profile_selection.properties]

["$defs".implementation_profile_selection.properties.id]
"$ref" = "#/$defs/kebab"

["$defs".implementation_profile_selection.properties.version]
type = "string"
minLength = 1

["$defs".implementation_profile_selection.properties.work_areas]
type = "array"
minItems = 1
uniqueItems = true

["$defs".implementation_profile_selection.properties.work_areas.items]
"$ref" = "#/$defs/kebab"

["$defs".legacy_structure]
type = "object"
required = ["mode", "accepted_truth_root", "active_changes_root", "archive_root", "global_truth_root"]
additionalProperties = false

["$defs".legacy_structure.properties]

["$defs".legacy_structure.properties.mode]
enum = ["single-package", "multi-package"]

["$defs".legacy_structure.properties.accepted_truth_root]
type = "string"

["$defs".legacy_structure.properties.active_changes_root]
type = "string"

["$defs".legacy_structure.properties.archive_root]
type = "string"

["$defs".legacy_structure.properties.global_truth_root]
type = ["string", "null"]

["$defs".layered_structure]
type = "object"
required = ["layout"]
additionalProperties = false

["$defs".layered_structure.properties]

["$defs".layered_structure.properties.layout]
enum = ["layered-v1", "slim-v1", "numbered-layers-v1", "recursive-framework-v1", "separated-methodology-v1"]

["$defs".legacy_package]
type = "object"
required = ["id", "path", "status"]
additionalProperties = false

["$defs".legacy_package.properties]

["$defs".legacy_package.properties.id]
"$ref" = "#/$defs/kebab"

["$defs".legacy_package.properties.path]
type = "string"

["$defs".legacy_package.properties.status]
enum = ["active", "retired"]

["$defs".layered_package]
type = "object"
required = ["id", "status", "layers"]
additionalProperties = false

["$defs".layered_package.properties]

["$defs".layered_package.properties.id]
"$ref" = "#/$defs/kebab"

["$defs".layered_package.properties.status]
enum = ["active", "retired"]

["$defs".layered_package.properties.layers]
type = "array"
minItems = 1
uniqueItems = true

["$defs".layered_package.properties.layers.items]
"$ref" = "#/$defs/layer"

["$defs".legacy_change_contract]
type = "object"
required = ["change_id_format", "pull_request_required_before_archive", "archive_requires_fresh_verification", "keep_pull_request_draft_until_archive_ready"]
additionalProperties = false

["$defs".legacy_change_contract.properties]

["$defs".legacy_change_contract.properties.change_id_format]
const = "kebab-case"

["$defs".legacy_change_contract.properties.pull_request_required_before_archive]
const = true

["$defs".legacy_change_contract.properties.archive_requires_fresh_verification]
const = true

["$defs".legacy_change_contract.properties.keep_pull_request_draft_until_archive_ready]
const = true

["$defs".layered_change_contract]
type = "object"
required = ["change_id_format", "change_slug_format", "pull_request_required_before_archive", "archive_requires_fresh_verification", "keep_pull_request_draft_until_archive_ready"]
additionalProperties = false

["$defs".layered_change_contract.properties]

["$defs".layered_change_contract.properties.change_id_format]
const = "project-type-layer-sequence"

["$defs".layered_change_contract.properties.change_slug_format]
const = "kebab-case"

["$defs".layered_change_contract.properties.pull_request_required_before_archive]
const = true

["$defs".layered_change_contract.properties.archive_requires_fresh_verification]
const = true

["$defs".layered_change_contract.properties.keep_pull_request_draft_until_archive_ready]
const = true

["$defs".work_areas]
"$comment" = "Each id and path must also be unique across the array; repository validation enforces property-level uniqueness."
type = "array"
uniqueItems = true

["$defs".work_areas.items]
"$ref" = "#/$defs/work_area"

["$defs".work_area]
type = "object"
required = ["id", "path"]
additionalProperties = false

["$defs".work_area.properties]

["$defs".work_area.properties.id]
"$ref" = "#/$defs/kebab"

["$defs".work_area.properties.path]
"$ref" = "#/$defs/repository_relative_path"

["$defs".repository_relative_path]
type = "string"
minLength = 1
pattern = "^(?!/)(?![A-Za-z]:)(?!.*\\\\)(?!.*//)(?!\\.{1,2}(?:/|$))(?!.*[/]\\.{1,2}(?:/|$))[^/]+(?:/[^/]+)*$"

["$defs".commit_provenance_correction]
type = "object"
required = ["commit", "original_message_sha256", "mode", "decision_ids", "verifies", "resolves", "session", "rationale"]
additionalProperties = false

["$defs".commit_provenance_correction.properties]

["$defs".commit_provenance_correction.properties.commit]
type = "string"
pattern = "^[0-9a-f]{40}$"

["$defs".commit_provenance_correction.properties.original_message_sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"

["$defs".commit_provenance_correction.properties.mode]
enum = ["implementation", "evidence"]

["$defs".commit_provenance_correction.properties.decision_ids]
type = "array"
minItems = 1
uniqueItems = true

["$defs".commit_provenance_correction.properties.decision_ids.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

["$defs".commit_provenance_correction.properties.verifies]
type = "array"
uniqueItems = true

["$defs".commit_provenance_correction.properties.verifies.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

["$defs".commit_provenance_correction.properties.resolves]
type = "array"
uniqueItems = true

["$defs".commit_provenance_correction.properties.resolves.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

["$defs".commit_provenance_correction.properties.session]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9._:-]+$"

["$defs".commit_provenance_correction.properties.rationale]
type = "string"
minLength = 1

[["$defs".commit_provenance_correction.allOf]]

["$defs".commit_provenance_correction.allOf.if]
required = ["mode"]

["$defs".commit_provenance_correction.allOf.if.properties]

["$defs".commit_provenance_correction.allOf.if.properties.mode]
const = "implementation"

["$defs".commit_provenance_correction.allOf.then]

["$defs".commit_provenance_correction.allOf.then.properties]

["$defs".commit_provenance_correction.allOf.then.properties.verifies]
maxItems = 0

["$defs".commit_provenance_correction.allOf.else]

["$defs".commit_provenance_correction.allOf.else.properties]

["$defs".commit_provenance_correction.allOf.else.properties.verifies]
minItems = 1

["$defs".contract_ids]
type = "array"
uniqueItems = true

["$defs".contract_ids.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-CONTRACT(?:-(?:META|GOV|TOOL|SKILL|IMPL|OPS))?-[0-9]{3,}$"

["$defs".story_ids]
type = "array"
uniqueItems = true

["$defs".story_ids.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-STORY(?:-(?:META|GOV|TOOL|SKILL|IMPL|OPS))?-[0-9]{3,}$"

["$defs".outcome_ids]
type = "array"
uniqueItems = true

["$defs".outcome_ids.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-OUTCOME(?:-(?:META|GOV|TOOL|SKILL|IMPL|OPS))?-[0-9]{3,}$"

[[allOf]]

[allOf.if]
required = ["schema_version"]

[allOf.if.properties]

[allOf.if.properties.schema_version]
enum = ["1.2", "1.3", "1.4", "1.5"]

[allOf.then]
required = ["release", "work_items", "work_areas"]

[allOf.then.not]

[[allOf.then.not.anyOf]]
required = ["contracts"]

[[allOf.then.not.anyOf]]
required = ["stories"]

[[allOf.then.not.anyOf]]
required = ["outcomes"]

[allOf.then.properties]

[allOf.then.properties.structure]
"$ref" = "#/$defs/layered_structure"

[allOf.then.properties.packages]
type = "array"
minItems = 1

[allOf.then.properties.packages.items]
"$ref" = "#/$defs/layered_package"

[allOf.then.properties.work_items]
type = "object"

[allOf.then.properties.change_contract]
"$ref" = "#/$defs/layered_change_contract"

[allOf.else]

[allOf.else.not]
required = ["work_areas"]

[allOf.else.properties]

[allOf.else.properties.structure]
"$ref" = "#/$defs/legacy_structure"

[allOf.else.properties.packages]
type = "array"
minItems = 1

[allOf.else.properties.packages.items]
"$ref" = "#/$defs/legacy_package"

[allOf.else.properties.change_contract]
"$ref" = "#/$defs/legacy_change_contract"

[[allOf]]

[allOf.if]

[allOf.if.properties]

[allOf.if.properties.schema_version]
enum = ["1.1", "1.1-draft"]

[allOf.then]
required = ["release", "work_items", "contracts"]

[allOf.then.properties]

[allOf.then.properties.work_items]

[allOf.then.properties.work_items.properties]

[allOf.then.properties.work_items.properties.registry]
enum = ["dset/intake.toml", "dset/intake.yaml"]
