schema_version: 1.0
id: core-v1
version: "0.2"
rules:
  -
    id: DSET-RULE-ARCHITECTURE
    template: architecture.md
    target: architecture.md
    applicability: applicable
    reason: Every governed workflow requires explicit authority and bootstrap boundaries
    depends_on: []
  -
    id: DSET-RULE-BUILD
    template: build-rules.md
    target: build-rules.md
    applicability: applicable
    reason: Implementation work requires selected gates and safe change behavior
    depends_on:
      - DSET-RULE-ARCHITECTURE
  -
    id: DSET-RULE-DOMAIN-SPEC
    template: domain-spec-authoring.md
    target: domain-spec-authoring.md
    applicability: applicable
    reason: Domain decisions must precede implementation planning
    depends_on:
      - DSET-RULE-ARCHITECTURE
  -
    id: DSET-RULE-TEST-PLAN
    template: test-planning.md
    target: test-planning.md
    applicability: applicable
    reason: Exact proof must be designed with requirements
    depends_on:
      - DSET-RULE-DOMAIN-SPEC
  -
    id: DSET-RULE-EVAL-PLAN
    template: eval-planning.md
    target: eval-planning.md
    applicability: applicable
    reason: Variable and qualitative proof requires an explicit owner
    depends_on:
      - DSET-RULE-DOMAIN-SPEC
  -
    id: DSET-RULE-SUPPORTABILITY
    template: supportability.md
    target: supportability.md
    applicability: applicable
    reason: Production investigation and recovery must be profile-scaled
    depends_on:
      - DSET-RULE-ARCHITECTURE
  -
    id: DSET-RULE-ARTIFACT-MAINTENANCE
    template: artifact-maintenance.md
    target: artifact-maintenance.md
    applicability: applicable
    reason: Durable conclusions require one writable owner and verified cutover
    depends_on:
      - DSET-RULE-ARCHITECTURE
  -
    id: DSET-RULE-WORK-ITEMS
    template: work-items.md
    target: work-items.md
    applicability: applicable
    reason: Intake must distinguish problems, opportunities, questions, and change-owned tasks
    depends_on:
      - DSET-RULE-ARCHITECTURE
  -
    id: DSET-RULE-DELEGATION-BUDGET
    template: delegation-budget.md
    target: delegation-budget.md
    applicability: applicable
    reason: Delegation requires inherited model/effort, bounded tree budgets, and a fixed quality floor
    depends_on:
      - DSET-RULE-ARCHITECTURE
  -
    id: DSET-RULE-SKILL-RUNS
    template: skill-runs.md
    target: skill-runs.md
    applicability: applicable
    reason: Skill invocations require bounded redacted supportability evidence
    depends_on:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-SUPPORTABILITY
      - DSET-RULE-DELEGATION-BUDGET
  -
    id: DSET-RULE-RELEASE
    template: release.md
    target: release.md
    applicability: applicable
    reason: Release preparation and protected publication require one deterministic transaction
    depends_on:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-BUILD
      - DSET-RULE-TEST-PLAN
      - DSET-RULE-EVAL-PLAN
      - DSET-RULE-SUPPORTABILITY
      - DSET-RULE-ARTIFACT-MAINTENANCE
  -
    id: DSET-RULE-LIFECYCLE
    template: lifecycle-orchestration.md
    target: lifecycle-orchestration.md
    applicability: applicable
    reason: The primary DSET entrypoint requires deterministic modes, precedence, authority, and stops
    depends_on:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-DOMAIN-SPEC
      - DSET-RULE-TEST-PLAN
      - DSET-RULE-EVAL-PLAN
      - DSET-RULE-SUPPORTABILITY
      - DSET-RULE-ARTIFACT-MAINTENANCE
      - DSET-RULE-WORK-ITEMS
      - DSET-RULE-DELEGATION-BUDGET
      - DSET-RULE-SKILL-RUNS
      - DSET-RULE-RELEASE
  -
    id: DSET-RULE-DIAGNOSIS
    template: diagnosis.md
    target: diagnosis.md
    applicability: applicable
    reason: Defect investigation requires evidence and authorization boundaries
    depends_on:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-TEST-PLAN
      - DSET-RULE-EVAL-PLAN
      - DSET-RULE-SUPPORTABILITY
      - DSET-RULE-ARTIFACT-MAINTENANCE
  -
    id: DSET-RULE-PROTOTYPING
    template: prototyping.md
    target: prototyping.md
    applicability: applicable
    reason: Solution experiments require comparable disposable evidence
    depends_on:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-TEST-PLAN
      - DSET-RULE-EVAL-PLAN
      - DSET-RULE-SUPPORTABILITY
      - DSET-RULE-ARTIFACT-MAINTENANCE
workflows:
  -
    id: lifecycle-orchestration
    rules:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-BUILD
      - DSET-RULE-DOMAIN-SPEC
      - DSET-RULE-TEST-PLAN
      - DSET-RULE-EVAL-PLAN
      - DSET-RULE-SUPPORTABILITY
      - DSET-RULE-ARTIFACT-MAINTENANCE
      - DSET-RULE-WORK-ITEMS
      - DSET-RULE-DELEGATION-BUDGET
      - DSET-RULE-SKILL-RUNS
      - DSET-RULE-RELEASE
      - DSET-RULE-LIFECYCLE
  -
    id: domain-clarification
    rules:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-DOMAIN-SPEC
      - DSET-RULE-TEST-PLAN
      - DSET-RULE-EVAL-PLAN
      - DSET-RULE-ARTIFACT-MAINTENANCE
  -
    id: diagnosis
    rules:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-DOMAIN-SPEC
      - DSET-RULE-TEST-PLAN
      - DSET-RULE-EVAL-PLAN
      - DSET-RULE-SUPPORTABILITY
      - DSET-RULE-ARTIFACT-MAINTENANCE
      - DSET-RULE-DIAGNOSIS
  -
    id: prototyping
    rules:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-DOMAIN-SPEC
      - DSET-RULE-TEST-PLAN
      - DSET-RULE-EVAL-PLAN
      - DSET-RULE-SUPPORTABILITY
      - DSET-RULE-ARTIFACT-MAINTENANCE
      - DSET-RULE-PROTOTYPING
  -
    id: release
    rules:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-BUILD
      - DSET-RULE-DOMAIN-SPEC
      - DSET-RULE-TEST-PLAN
      - DSET-RULE-EVAL-PLAN
      - DSET-RULE-SUPPORTABILITY
      - DSET-RULE-ARTIFACT-MAINTENANCE
      - DSET-RULE-DELEGATION-BUDGET
      - DSET-RULE-SKILL-RUNS
      - DSET-RULE-RELEASE
  -
    id: work-triage
    rules:
      - DSET-RULE-ARCHITECTURE
      - DSET-RULE-ARTIFACT-MAINTENANCE
      - DSET-RULE-WORK-ITEMS
wrappers:
  -
    workflow: domain-clarification
    path: skills/dset-clarify/SKILL.md
  -
    workflow: diagnosis
    path: skills/dset-diagnose/SKILL.md
  -
    workflow: prototyping
    path: skills/dset-prototype/SKILL.md
