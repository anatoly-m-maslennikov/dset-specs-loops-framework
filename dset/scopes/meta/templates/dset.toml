# DSET settings schema. Accepted value: "1.1"; selects this settings contract.
# Default: "1.1".
schema_version = "1.1"

[artifacts]
# Include the direct artifact subtype after the primary artifact type in IDs and
# filenames for newly emitted artifacts only. Existing names are never renamed.
# Accepted: true or false. Default: false.
# Example with false: DSET-DELIVERY-001-0-4-core.md
#   metadata: artifact_type = "delivery", artifact_subtype = "version_scope"
# Example with true: DSET-DELIVERY-VERSION-SCOPE-001-0-4-core.md
# Other subtype examples that can enter names when true:
#   analysis_report: solution_landscape, root_cause_analysis, proposal,
#     technical_investigation, external_audit_analysis
#   specification: domain_model, behavior, architecture, design, governance
#   procedure: playbook, runbook
#   plan: implementation_plan, test_plan, evaluation_plan
#   delivery: roadmap, version_scope, change, release_plan, readiness_record,
#     release_record
#   implementation: source_code, documentation, configuration, migration,
#     test_implementation, evaluation_implementation
#   evidence_record: test_result, evaluation_result, review_report, run_record
#   derived_view: project_overview, health_dashboard, traceability_index, changelog
#   navigation: readme, hub, index
# atomic_record and verification currently have no artifact subtypes.
# This setting does not alter an atomic record's separate semantic classification,
# such as Decision/Requirement, Question/Conflict, Problem/Defect, or QA/Test.
subtype_in_names = false
# Set the artifact-creation gate. Accepted: "medium" or "high"; medium requires
# clear core fields, while high requires every material question resolved.
# Example: medium may emit when authority, claim, Type, scope, provenance, links,
# priority, and acceptance are clear even if optional context remains unknown.
# High stops and asks questions when a boundary, lineage, conflict, or proof
# obligation is materially ambiguous.
# Default: "medium".
creation_strictness = "medium"

[workflows.implement]
# Choose implementation preparation. Accepted: "lazy" or "strict"; lazy closes
# missing Decisions and proof/build plans first, while strict invokes only
# implementation and stops when accepted inputs are insufficient. Default: "lazy".
# Example lazy chain: decisions -> plan-proof -> plan-implementation -> implement,
# skipping any prerequisite that is already complete. Strict runs only implement.
mode = "lazy"

[priority]
# Define the highest-to-lowest project priority vocabulary. Accepted: an array
# of at least two unique strings. Default: the five values below.
# Array order is precedence: critical outranks high, and deferred ranks last.
scale = ["critical", "high", "medium", "low", "deferred"]
# Priority assigned when an artifact has no explicit value. Accepted:
# one value from priority.scale. Default: "medium".
default = "medium"
