    artifact_subtype: configuration
  -
    pattern: "**/dependency-policy.yaml"
    artifact_type: implementation
    artifact_subtype: configuration
  -
    pattern: "**/templates/governance/*/architecture.md"
    artifact_type: specification
    artifact_subtype: architecture
  -
    pattern: "**/templates/governance/*/artifact-classification.md"
