  -
    pattern: "**/templates/governance/*/release.md"
    artifact_type: specification
    artifact_subtype: governance
  -
    pattern: "**/templates/governance/*/supportability.md"
    artifact_type: specification
    artifact_subtype: governance
  -
    pattern: "**/templates/governance/*/delegation-budget.md"
    artifact_type: specification
    artifact_subtype: governance
  -
    pattern: "**/templates/governance/*/diagnosis.md"
    artifact_type: specification
    artifact_subtype: governance
  -
    pattern: "**/templates/governance/*/lifecycle-orchestration.md"
    artifact_type: specification
    artifact_subtype: governance
  -
    pattern: "**/templates/governance/*/prototyping.md"
    artifact_type: specification
    artifact_subtype: governance
  -
    pattern: "**/templates/governance/*/skill-runs.md"
    artifact_type: specification
