      - proposal
      - technical_investigation
      - external_audit_analysis
  -
    id: specification
    primary_question: What current or required truth does this document compile?
    allow_empty_subtype: true
    subtypes:
      - domain_model
      - behavior
      - architecture
      - design
      - governance
  -
    id: procedure
    primary_question: What reusable way of working should an operator enact?
    allow_empty_subtype: true
    subtypes:
      - playbook
      - runbook
  -
    id: plan
    primary_question: What intended work or proof should occur for this bounded objective?
    allow_empty_subtype: true
    subtypes:
      - implementation_plan
      - test_plan
      - evaluation_plan
  -
    id: delivery
    primary_question: What bounded delivery intent, transaction, gate, or publication record does this artifact own?
    allow_empty_subtype: true
    subtypes:
      - roadmap
      - version_scope
      - change
      - release_plan
      - readiness_record
      - release_record
  -
    id: implementation
    primary_question: What realizes accepted truth or QA definitions?
    allow_empty_subtype: true
    subtypes:
      - source_code
      - documentation
      - configuration
      - migration
      - test_implementation
      - evaluation_implementation
  -
    id: evidence_record
    primary_question: What was observed for an identified subject, revision, method, and time?
    allow_empty_subtype: true
    subtypes:
      - test_result
      - evaluation_result
      - review_report
      - run_record
  -
    id: verification
    primary_question: What do the applicable evidence records support at this revision?
    allow_empty_subtype: true
    subtypes: []
  -
    id: derived_view
    primary_question: What does current canonical project data imply for this declared use?
    allow_empty_subtype: true
    subtypes:
      - project_overview
      - health_dashboard
      - traceability_index
      - changelog
  -
    id: navigation
    primary_question: Where should a reader start or continue?
    allow_empty_subtype: true
    subtypes:
      - readme
      - hub
      - index

