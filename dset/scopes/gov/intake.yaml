items:
  - id: DSET-PROBLEM-TOOL-001
    llm_session_ids:
      - "codex:019f591f-04f6-70f2-8de7-828b7cccc69d"
    scope: tool
    type: problem
    status: open
    title: Released validator cannot parse schema 1.2
    statement: The previous released validator predates layered schema 1.2, so the current fixed point uses the exact migration commit as a clearly labeled non-release transition baseline. Release assurance remains degraded until a published compatible validator checks a later candidate or an accepted compatibility proof closes the gap.
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs:
      - https://github.com/anatoly-m-maslennikov/dset-specs-loops-framework/pull/9
