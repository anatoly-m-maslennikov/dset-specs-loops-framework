  - id: DSET-QUESTION-GOV-002
    llm_session_ids:
      - "codex:019f591f-04f6-70f2-8de7-828b7cccc69d"
    scope: gov
    type: question
    status: open
    title: Which priority scale should DSET standardize?
    statement: The framework now uses priority as its only generic ordered rank for every governed artifact, orders remediation across every conflict class, and selects claims only for declared selectable policy conflicts after immutable authority and explicit precedence, but should core-v1 standardize one bounded scale and inheritance/override/conflict-classification policy, provide replaceable defaults, or require every project to declare them?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
