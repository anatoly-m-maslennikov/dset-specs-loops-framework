schema_version: "1.1"
items:
  - id: DSET-PROBLEM-TOOL-001
    scope: tool
    type: problem
    status: open
    title: Released validator cannot parse schema 1.2
    statement: The previous released validator predates layered schema 1.2, so the current fixed point uses the exact migration commit as a clearly labeled non-release transition baseline. Release assurance remains degraded until a published compatible validator checks a later candidate or an accepted compatibility proof closes the gap.
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs:
      - https://github.com/anatoly-m-maslennikov/dset-specs-loops-framework/pull/9
  - id: DSET-QUESTION-GOV-001
    scope: gov
    type: question
    status: open
    title: Should Action become a first-class entity?
    statement: Should a later DSET version promote Action into a first-class entity, or are executable tasks inside a DSET Change sufficient?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-META-001
    scope: meta
    type: question
    status: open
    title: Should DSET standardize Journey?
    statement: Should a later DSET version define a Journey artifact for a stakeholder experience that spans multiple changes?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-META-002
    scope: meta
    type: question
    status: open
    title: Should DSET standardize Actor and Persona?
    statement: Should a later DSET version define Actor and Persona as separate artifact types, fields on existing entities, or optional project vocabulary?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-META-003
    scope: meta
    type: question
    status: open
    title: Should DSET standardize Hypothesis and Experiment?
    statement: Should a later DSET version define Hypothesis and Experiment artifacts, and how should they differ from prototypes, evals, and Decisions?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-GOV-002
    scope: gov
    type: question
    status: open
    title: Should DSET standardize prioritization?
    statement: Should a later DSET version define a prioritization method or remain neutral while projects register their own governing rule?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-OPS-001
    scope: ops
    type: question
    status: open
    title: Should DSET standardize feedback and analytics evidence?
    statement: Should a later DSET version define how product feedback and analytics become bounded evidence for Outcomes, Problems, Opportunities, and Changes?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-GOV-003
    scope: gov
    type: question
    status: open
    title: Should DSET generate roadmap and release views?
    statement: Should a later DSET version generate roadmap and release views from canonical Changes, Outcomes, Decisions, and evidence without making the views new authorities?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-PROBLEM-TOOL-002
    scope: tool
    type: problem
    status: open
    title: Generated adopter does not exercise current schema 1.2
    statement: The bounded temporary adopter proves legacy schema 1.1 compatibility, but DSET lacks a second generated adopter that exercises the current layered schema 1.2 layout, Work Areas, integration-branch default, and optional worktree mode.
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs:
      - https://github.com/anatoly-m-maslennikov/dset-specs-loops-framework/pull/9
  - id: DSET-PROBLEM-SKILL-001
    scope: skill
    type: problem
    status: open
    title: Core skill runtime is incomplete
    statement: DSET publishes only the clarify, diagnose, and prototype wrappers. The primary dset wrapper, guarded dset-release wrapper, run writer, session checkpoint, resume path, and host-native proof remain unimplemented, so the declared five-skill and continuity contracts are not usable end to end.
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs:
      - https://github.com/anatoly-m-maslennikov/dset-specs-loops-framework/pull/9
  - id: DSET-PROBLEM-OPS-001
    scope: ops
    type: problem
    status: open
    title: Current exact-head hosted proof is missing
    statement: Local dev contains unpushed commits beyond remote dev, while the recorded hosted fixed-point proof belongs to an older PR head. Release and adoption-readiness claims therefore lack current GitHub workflow, check, and protected-target evidence for the actual candidate SHA.
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs:
      - https://github.com/anatoly-m-maslennikov/dset-specs-loops-framework/pull/9
  - id: DSET-PROBLEM-GOV-001
    scope: gov
    type: problem
    status: resolved
    title: Active deltas and accepted truth reuse IDs inconsistently
    statement: The active 0.3 Change formerly retained pre-layer IDs whose accepted owners now used those IDs differently. The live delta, manifest, proof plans, solution landscape, and verification now reference the current accepted layer-owned IDs and retain only genuinely unaccepted deltas.
    owner_change: DSET-CHANGE-SKILL-001
    decision: null
    external_refs:
      - https://github.com/anatoly-m-maslennikov/dset-specs-loops-framework/pull/9
  - id: DSET-QUESTION-META-004
    scope: meta
    type: question
    status: open
    title: Should evidence context be separate from Work Area?
    statement: Should DSET add a compact execution and evidence context for version, environment, assumptions, and time while keeping Work Area only as the repository ownership and target boundary?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-META-005
    scope: meta
    type: question
    status: open
    title: Should Work Areas expose optional descriptive tags?
    statement: Should a later schema allow explicitly non-authoritative Work Area tags or capabilities for discovery, or should Work Areas remain only ID and path to avoid content classification drift?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-GOV-004
    scope: gov
    type: question
    status: open
    title: Should traceability use typed relation edges?
    statement: Should DSET replace or supplement untyped ID buckets with a small typed-edge registry that distinguishes verifies, evaluates, constrains, discharges, supersedes, supports, rebuts, and undercuts while preserving simple generated views?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-GOV-005
    scope: gov
    type: question
    status: open
    title: Should Decision lifecycle be schema-enforced?
    statement: Should Decision status, date, evidence basis, supersedes and superseded-by links, confirmation or violation evidence, and reopen conditions become a validated record instead of remaining a governing template contract?
    owner_change: DSET-CHANGE-SKILL-001
    decision: pending
    external_refs: []
  - id: DSET-PROBLEM-GOV-002
    scope: gov
    type: problem
    status: resolved
    title: Roadmap redeclared accepted Test and Eval IDs
    statement: The active roadmap formerly assigned already-owned Test and Eval IDs to different assertions, creating duplicate semantic owners. Sections 8 and 9 now link to the layer-owned proof plans and the active Change execution plans without redefining those entities.
    owner_change: DSET-CHANGE-SKILL-001
    decision: null
    external_refs:
      - https://github.com/anatoly-m-maslennikov/dset-specs-loops-framework/pull/9
