schema_version: 1.0
project: {{project_id}}
target_root: dset
surface_catalog:
  -
    type: agent-guidance
    examples:
      - AGENTS.md
      - CLAUDE.md
    target_kind: concise-wrapper-or-hub
  -
    type: project-rules
    examples:
      - architecture
      - build
      - authoring
      - supportability
    target_kind: registered-governing-document
  -
    type: accepted-specification
    examples:
      - domain
      - behavior
      - contracts
    target_kind: accepted-package-truth
  -
    type: deterministic-proof
    examples:
      - test-plan
      - regression-plan
    target_kind: test-plan
  -
    type: qualitative-proof
    examples:
      - eval-plan
      - rubric
    target_kind: eval-plan
  -
    type: delivery-history
    examples:
      - implementation-plan
      - Decision-or-legacy-ADR
      - runbook
      - evidence
    target_kind: active-change-decision-runbook-or-read-only-history
sources:
  - path: {{existing_artifact_root}}
    concern: {{owned_concern}}
    owner: {{owner}}
    current_writer: {{writer}}
    consumers:
      - {{consumer}}
    current_status: {{accepted_current_active_or_historical}}
    target: dset/scopes/{{layer}}/specs/packages/{{package_id}}
    target_artifacts:
      - {{target_artifact}}
    disposition: pending
    retention: {{retention_decision}}
    read_only_after_cutover: true
cutover:
  change_id: {{change_id}}
  pull_request: pending
  verification: pending
