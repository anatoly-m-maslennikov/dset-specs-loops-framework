schema_version: 1.0
scope_mode: multi-scope
scopes:
  - id: meta
    id_segment: META
    kind: layer
    name: Project metadata and accepted truth
    path: dset
  - id: gov
    id_segment: GOV
    kind: layer
    name: Governance and lifecycle policy
    path: dset/governance
  - id: tool
    id_segment: TOOL
    kind: layer
    name: Executable toolchain
    path: dset_toolchain
  - id: skill
    id_segment: SKILL
    kind: layer
    name: User-facing skills
    path: skills
  - id: ops
    id_segment: OPS
    kind: layer
    name: Operations and supportability
    path: dset/supportability
items:
  - id: DSET-QUESTION-GOV-001
    scope: gov
    type: question
    status: open
    title: Should Action become a first-class entity?
    statement: Should a later DSET version promote Action into a first-class entity, or are executable tasks inside a DSET Change sufficient?
    owner_change: make-dset-self-hosting-and-skills-thin
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-META-001
    scope: meta
    type: question
    status: open
    title: Should DSET standardize Journey?
    statement: Should a later DSET version define a Journey artifact for a stakeholder experience that spans multiple changes?
    owner_change: make-dset-self-hosting-and-skills-thin
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-META-002
    scope: meta
    type: question
    status: open
    title: Should DSET standardize Actor and Persona?
    statement: Should a later DSET version define Actor and Persona as separate artifact types, fields on existing entities, or optional project vocabulary?
    owner_change: make-dset-self-hosting-and-skills-thin
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-META-003
    scope: meta
    type: question
    status: open
    title: Should DSET standardize Hypothesis and Experiment?
    statement: Should a later DSET version define Hypothesis and Experiment artifacts, and how should they differ from prototypes, evals, and Decisions?
    owner_change: make-dset-self-hosting-and-skills-thin
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-GOV-002
    scope: gov
    type: question
    status: open
    title: Should DSET standardize prioritization?
    statement: Should a later DSET version define a prioritization method or remain neutral while projects register their own governing rule?
    owner_change: make-dset-self-hosting-and-skills-thin
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-OPS-001
    scope: ops
    type: question
    status: open
    title: Should DSET standardize feedback and analytics evidence?
    statement: Should a later DSET version define how product feedback and analytics become bounded evidence for Outcomes, Problems, Opportunities, and Changes?
    owner_change: make-dset-self-hosting-and-skills-thin
    decision: pending
    external_refs: []
  - id: DSET-QUESTION-GOV-003
    scope: gov
    type: question
    status: open
    title: Should DSET generate roadmap and release views?
    statement: Should a later DSET version generate roadmap and release views from canonical Changes, Outcomes, Decisions, and evidence without making the views new authorities?
    owner_change: make-dset-self-hosting-and-skills-thin
    decision: pending
    external_refs: []
