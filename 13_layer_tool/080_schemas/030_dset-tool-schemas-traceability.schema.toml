"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/03_tool/schemas/traceability.schema.toml"
title = "DSET traceability index"
type = "object"
required = ["schema_version", "repository", "changes", "semantic_classifications", "semantic_atoms", "relations"]
additionalProperties = false

[properties]

[properties.schema_version]
enum = ["1.1", "1.2", "1.3"]

[properties.repository]
type = "string"

[properties.changes]
type = "array"

[properties.changes.items]
type = "object"
required = ["id", "status", "packages", "requirements", "tests", "evals", "intake", "decisions", "contracts", "stories", "outcomes", "pull_request", "evidence"]
additionalProperties = false

[properties.changes.items.properties]

[properties.changes.items.properties.id]
type = "string"

[properties.changes.items.properties.slug]
type = "string"
pattern = "^[a-z0-9]+(?:-[a-z0-9]+)*$"

[properties.changes.items.properties.status]
type = "string"

[properties.changes.items.properties.primary_layer]
enum = ["meta", "gov", "tool", "skill", "ops"]

[properties.changes.items.properties.affected_layers]
type = "array"
minItems = 1
uniqueItems = true

[properties.changes.items.properties.affected_layers.items]
enum = ["meta", "gov", "tool", "skill", "ops"]

[properties.changes.items.properties.workspace]
"$ref" = "#/$defs/workspace"

[properties.changes.items.properties.dependencies]
type = "array"

[properties.changes.items.properties.dependencies.items]
"$ref" = "#/$defs/dependency"

[properties.changes.items.properties.target]
"$ref" = "#/$defs/target"

[properties.changes.items.properties.packages]
type = "array"

[properties.changes.items.properties.packages.items]
type = "string"

[properties.changes.items.properties.requirements]
type = "array"

[properties.changes.items.properties.requirements.items]
type = "string"

[properties.changes.items.properties.tests]
type = "array"

[properties.changes.items.properties.tests.items]
type = "string"

[properties.changes.items.properties.evals]
type = "array"

[properties.changes.items.properties.evals.items]
type = "string"

[properties.changes.items.properties.intake]
type = "array"

[properties.changes.items.properties.intake.items]
type = "string"

[properties.changes.items.properties.decisions]
type = "array"

[properties.changes.items.properties.decisions.items]
type = "string"

[properties.changes.items.properties.contracts]
type = "array"

[properties.changes.items.properties.contracts.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-CONTRACT(?:-(?:META|GOV|TOOL|SKILL|IMPL|OPS))?-[0-9]{3,}$"

[properties.changes.items.properties.stories]
type = "array"

[properties.changes.items.properties.stories.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-STORY(?:-(?:META|GOV|TOOL|SKILL|IMPL|OPS))?-[0-9]{3,}$"

[properties.changes.items.properties.outcomes]
type = "array"

[properties.changes.items.properties.outcomes.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-OUTCOME(?:-(?:META|GOV|TOOL|SKILL|IMPL|OPS))?-[0-9]{3,}$"

[properties.changes.items.properties.pull_request]
type = "string"
format = "uri"

[properties.changes.items.properties.evidence]
type = "array"

[properties.changes.items.properties.evidence.items]
type = "string"

[properties.relations]
type = "array"

[properties.relations.items]
"$ref" = "#/$defs/relation"

[properties.semantic_atoms]
type = "array"

[properties.semantic_atoms.items]
"$ref" = "#/$defs/semantic_atom"

[properties.semantic_classifications]
type = "array"

[properties.semantic_classifications.items]
"$ref" = "#/$defs/semantic_classification"

["$defs"]

["$defs".relation_id]
type = "string"
pattern = "^[A-Z0-9]+(?:-[A-Z0-9]+)+$"

["$defs".semantic_atom]
type = "object"
required = ["id", "carrier_id", "carrier", "sha256", "type", "subtype", "emission_status", "current_status", "priority", "priority_source", "relations", "lifecycle_events", "absorbed_by", "archived"]
additionalProperties = false

["$defs".semantic_atom.properties]

["$defs".semantic_atom.properties.id]
"$ref" = "#/$defs/relation_id"

["$defs".semantic_atom.properties.carrier_id]
"$ref" = "#/$defs/relation_id"

["$defs".semantic_atom.properties.carrier]
type = "string"
pattern = "^[^/\\\\]+$"

["$defs".semantic_atom.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"

["$defs".semantic_atom.properties.type]
enum = ["decision", "question", "problem", "qa"]

["$defs".semantic_atom.properties.subtype]
enum = ["none", "requirement", "constraint", "contract", "implementation_decision", "conflict", "risk", "opportunity", "defect", "gap", "debt", "test_plan", "evaluation_plan"]

["$defs".semantic_atom.properties.emission_status]
enum = ["proposed", "accepted"]

["$defs".semantic_atom.properties.current_status]
enum = ["proposed", "accepted", "answered", "absorbed", "confirmed", "reopened", "rejected", "resolved", "retired", "withdrawn"]

["$defs".semantic_atom.properties.priority]
type = "string"
minLength = 1

["$defs".semantic_atom.properties.priority_source]
type = "string"
minLength = 1

["$defs".semantic_atom.properties.relations]
type = "array"

["$defs".semantic_atom.properties.relations.items]
"$ref" = "#/$defs/atom_relation"

["$defs".semantic_atom.properties.lifecycle_events]
type = "array"
uniqueItems = true

["$defs".semantic_atom.properties.lifecycle_events.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-LIFECYCLE-EVENT-[0-9]{3,}$"

["$defs".semantic_atom.properties.absorbed_by]
type = "array"
uniqueItems = true

["$defs".semantic_atom.properties.absorbed_by.items]
"$ref" = "#/$defs/relation_id"

["$defs".semantic_atom.properties.archived]
type = "boolean"

["$defs".semantic_classification]
type = "object"
required = ["id", "type", "subtype", "historical_carrier", "origins", "carriers", "carrier_statuses", "lifecycle_events"]
additionalProperties = false

["$defs".semantic_classification.properties]

["$defs".semantic_classification.properties.id]
"$ref" = "#/$defs/relation_id"

["$defs".semantic_classification.properties.type]
enum = ["decision", "question", "problem", "qa"]

["$defs".semantic_classification.properties.subtype]
enum = ["none", "requirement", "constraint", "contract", "implementation_decision", "conflict", "risk", "opportunity", "defect", "gap", "debt", "test_plan", "evaluation_plan"]

["$defs".semantic_classification.properties.historical_carrier]
type = "boolean"

["$defs".semantic_classification.properties.origins]
type = "array"
minItems = 1
uniqueItems = true

["$defs".semantic_classification.properties.origins.items]
type = "string"
minLength = 1

["$defs".semantic_classification.properties.carriers]
type = "array"
minItems = 1
uniqueItems = true

["$defs".semantic_classification.properties.carriers.items]
type = "string"
minLength = 1

["$defs".semantic_classification.properties.carrier_statuses]
type = "array"
minItems = 1
uniqueItems = true

["$defs".semantic_classification.properties.carrier_statuses.items]
type = "string"
minLength = 1

["$defs".semantic_classification.properties.lifecycle_events]
type = "array"
uniqueItems = true

["$defs".semantic_classification.properties.lifecycle_events.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-LIFECYCLE-EVENT-[0-9]{3,}$"

["$defs".relation_type]
enum = ["child_of", "analysis_of", "projection_of", "implementation_of", "check_of", "evidence_for", "resolution_of", "override_of", "replacement_of", "relates_to"]

["$defs".projection_range]
type = "object"
required = ["semantic_type", "scope", "through"]
additionalProperties = false

["$defs".projection_range.properties]

["$defs".projection_range.properties.semantic_type]
enum = ["decision", "question", "problem", "qa"]

["$defs".projection_range.properties.subtype]
enum = ["none", "requirement", "constraint", "contract", "implementation_decision", "conflict", "risk", "opportunity", "defect", "gap", "debt", "test_plan", "evaluation_plan"]

["$defs".projection_range.properties.layer]
enum = ["meta", "gov", "tool", "skill", "ops"]

["$defs".projection_range.properties.scope]
type = "object"
required = ["kind", "id"]
additionalProperties = false

["$defs".projection_range.properties.scope.properties]

["$defs".projection_range.properties.scope.properties.kind]
enum = ["project", "layer", "feature_group", "feature"]

["$defs".projection_range.properties.scope.properties.id]
type = "string"
minLength = 1

["$defs".projection_range.properties.through]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-ATOMIC-RECORD-[0-9]{3,}$"

["$defs".atom_relation]
type = "object"
required = ["type", "origin"]
additionalProperties = false

["$defs".atom_relation.properties]

["$defs".atom_relation.properties.type]
"$ref" = "#/$defs/relation_type"

["$defs".atom_relation.properties.target]
"$ref" = "#/$defs/relation_id"

["$defs".atom_relation.properties.range]
"$ref" = "#/$defs/projection_range"

["$defs".atom_relation.properties.origin]
enum = ["authored", "legacy_child_of"]

[["$defs".atom_relation.oneOf]]
required = ["target"]

["$defs".atom_relation.oneOf.not]
required = ["range"]

[["$defs".atom_relation.oneOf]]
required = ["range"]

["$defs".atom_relation.oneOf.not]
required = ["target"]

["$defs".relation]
type = "object"
required = ["source", "source_kind", "type", "origin", "llm_session_ids"]
additionalProperties = false

["$defs".relation.properties]

["$defs".relation.properties.source]

[["$defs".relation.properties.source.oneOf]]
"$ref" = "#/$defs/relation_id"

[["$defs".relation.properties.source.oneOf]]
type = "string"
pattern = "^[0-9a-f]{40}$"

["$defs".relation.properties.source_kind]
enum = ["artifact", "commit"]

["$defs".relation.properties.source_artifact_id]
"$ref" = "#/$defs/relation_id"

["$defs".relation.properties.source_carrier]
type = "string"
pattern = "^[^/\\\\]+$"

["$defs".relation.properties.type]
"$ref" = "#/$defs/relation_type"

["$defs".relation.properties.target]
"$ref" = "#/$defs/relation_id"

["$defs".relation.properties.range]
"$ref" = "#/$defs/projection_range"

["$defs".relation.properties.origin]
enum = ["authored", "legacy_child_of", "commit_trailer"]

["$defs".relation.properties.llm_session_ids]
type = "array"
uniqueItems = true

["$defs".relation.properties.llm_session_ids.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9._:-]+$"

[["$defs".relation.oneOf]]
required = ["target"]

["$defs".relation.oneOf.not]
required = ["range"]

[["$defs".relation.oneOf]]
required = ["range"]

["$defs".relation.oneOf.not]
required = ["target"]

[["$defs".relation.allOf]]

["$defs".relation.allOf.if]

["$defs".relation.allOf.if.properties]

["$defs".relation.allOf.if.properties.source_kind]
const = "artifact"

["$defs".relation.allOf.then]
required = ["source_artifact_id", "source_carrier"]

[["$defs".relation.allOf]]

["$defs".relation.allOf.if]

["$defs".relation.allOf.if.properties]

["$defs".relation.allOf.if.properties.source_kind]
const = "commit"

["$defs".relation.allOf.then]
required = ["target"]

["$defs".relation.allOf.then.properties]

["$defs".relation.allOf.then.properties.type]
const = "implementation_of"

["$defs".relation.allOf.then.properties.origin]
const = "commit_trailer"

["$defs".change_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-CHANGE-(?:META|GOV|TOOL|SKILL|IMPL|OPS)-[0-9]{3,}$"

["$defs".trace_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-(?:DECISION|REQUIREMENT|CONSTRAINT|CONTRACT|STORY|OUTCOME|SCENARIO|INVARIANT|QUESTION|CONFLICT|RISK|OPPORTUNITY|PROBLEM|DEFECT|GAP|DEBT|TEST-PLAN|EVAL-PLAN|TASK|CHANGE)(?:-(?:META|GOV|TOOL|SKILL|IMPL|OPS))?-[0-9]{3,}$"

["$defs".sha_or_pending]

[["$defs".sha_or_pending.oneOf]]
type = "string"
pattern = "^[0-9a-f]{40}$"

[["$defs".sha_or_pending.oneOf]]
const = "pending"

["$defs".pull_request]
type = "object"
required = ["repository", "number", "url"]
additionalProperties = false

["$defs".pull_request.properties]

["$defs".pull_request.properties.repository]
type = "string"
pattern = "^[^/]+/[^/]+$"

["$defs".pull_request.properties.number]

[["$defs".pull_request.properties.number.oneOf]]
type = "integer"
minimum = 1

[["$defs".pull_request.properties.number.oneOf]]
const = "pending"

["$defs".pull_request.properties.url]
type = "string"
minLength = 1

["$defs".workspace]
type = "object"
required = ["isolation", "branch", "base_ref", "base_commit", "head_commit"]
additionalProperties = false

["$defs".workspace.properties]

["$defs".workspace.properties.isolation]
enum = ["integration-branch", "branch-worktree"]

["$defs".workspace.properties.branch]
type = "string"
minLength = 1

["$defs".workspace.properties.base_ref]
type = "string"
minLength = 1

["$defs".workspace.properties.base_commit]
"$ref" = "#/$defs/sha_or_pending"

["$defs".workspace.properties.head_commit]
"$ref" = "#/$defs/sha_or_pending"

["$defs".target]
type = "object"
required = ["repository", "work_areas"]
additionalProperties = false

["$defs".target.properties]

["$defs".target.properties.repository]
type = "boolean"

["$defs".target.properties.work_areas]
type = "array"
uniqueItems = true

["$defs".target.properties.work_areas.items]
type = "string"
pattern = "^[a-z0-9]+(?:-[a-z0-9]+)*$"

[["$defs".target.oneOf]]

["$defs".target.oneOf.properties]

["$defs".target.oneOf.properties.repository]
const = true

["$defs".target.oneOf.properties.work_areas]
maxItems = 0

[["$defs".target.oneOf]]

["$defs".target.oneOf.properties]

["$defs".target.oneOf.properties.repository]
const = false

["$defs".target.oneOf.properties.work_areas]
minItems = 1

["$defs".dependency]
type = "object"
required = ["change_id", "pull_request", "required_commit", "consumes", "claim", "use", "evidence", "checked_at", "reopen_when", "status"]
additionalProperties = false

["$defs".dependency.properties]

["$defs".dependency.properties.change_id]
"$ref" = "#/$defs/change_id"

["$defs".dependency.properties.pull_request]
"$ref" = "#/$defs/pull_request"

["$defs".dependency.properties.required_commit]
"$ref" = "#/$defs/sha_or_pending"

["$defs".dependency.properties.consumes]
type = "array"
minItems = 1
uniqueItems = true

["$defs".dependency.properties.consumes.items]
"$ref" = "#/$defs/trace_id"

["$defs".dependency.properties.claim]
type = "string"
minLength = 1

["$defs".dependency.properties.use]
type = "string"
minLength = 1

["$defs".dependency.properties.evidence]
type = "string"
minLength = 1

["$defs".dependency.properties.checked_at]
type = "string"
format = "date"

["$defs".dependency.properties.reopen_when]
type = "string"
minLength = 1

["$defs".dependency.properties.status]
enum = ["planned", "available", "integrated", "blocked", "stale"]

[["$defs".dependency.allOf]]

["$defs".dependency.allOf.if]
required = ["status"]

["$defs".dependency.allOf.if.properties]

["$defs".dependency.allOf.if.properties.status]
enum = ["available", "integrated"]

["$defs".dependency.allOf.then]

["$defs".dependency.allOf.then.properties]

["$defs".dependency.allOf.then.properties.pull_request]

["$defs".dependency.allOf.then.properties.pull_request.properties]

["$defs".dependency.allOf.then.properties.pull_request.properties.number]
type = "integer"
minimum = 1

["$defs".dependency.allOf.then.properties.pull_request.properties.url]
type = "string"
format = "uri"
pattern = "^https://"

["$defs".dependency.allOf.then.properties.required_commit]
type = "string"
pattern = "^[0-9a-f]{40}$"

[[allOf]]

[allOf.if]
required = ["schema_version"]

[allOf.if.properties]

[allOf.if.properties.schema_version]
enum = ["1.2", "1.3"]

[allOf.then]

[allOf.then.properties]

[allOf.then.properties.changes]

[allOf.then.properties.changes.items]
required = ["slug", "primary_layer", "affected_layers", "workspace", "dependencies", "target"]

[allOf.then.properties.changes.items.properties]

[allOf.then.properties.changes.items.properties.id]
"$ref" = "#/$defs/change_id"

[allOf.else]

[allOf.else.properties]

[allOf.else.properties.changes]

[allOf.else.properties.changes.items]

[allOf.else.properties.changes.items.not]

[[allOf.else.properties.changes.items.not.anyOf]]
required = ["slug"]

[[allOf.else.properties.changes.items.not.anyOf]]
required = ["primary_layer"]

[[allOf.else.properties.changes.items.not.anyOf]]
required = ["affected_layers"]

[[allOf.else.properties.changes.items.not.anyOf]]
required = ["workspace"]

[[allOf.else.properties.changes.items.not.anyOf]]
required = ["dependencies"]

[[allOf.else.properties.changes.items.not.anyOf]]
required = ["target"]
