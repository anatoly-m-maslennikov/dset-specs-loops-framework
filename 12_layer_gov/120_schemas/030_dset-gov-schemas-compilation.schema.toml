"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/02_gov/schemas/compilation.schema.toml"
title = "DSET active authority compilation index"
type = "object"
required = ["schema_version", "records"]
additionalProperties = false

[properties]

[properties.schema_version]
const = "1.0"

[properties.records]
type = "array"
uniqueItems = true

[properties.records.items]
"$ref" = "#/$defs/record"

["$defs"]

["$defs".identity]
type = "object"
required = ["carrier", "sha256"]
additionalProperties = false

["$defs".identity.properties]

["$defs".identity.properties.carrier]
type = "string"
pattern = "^[^/\\\\]+$"

["$defs".identity.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"

["$defs".fragment]
type = "object"
required = ["kind", "line", "sha256"]
additionalProperties = false

["$defs".fragment.properties]

["$defs".fragment.properties.kind]
enum = ["section", "table-row", "labeled-block"]

["$defs".fragment.properties.line]
type = "integer"
minimum = 1

["$defs".fragment.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"

["$defs".projection]
type = "object"
required = ["carrier", "sha256", "fragments"]
additionalProperties = false

["$defs".projection.properties]

["$defs".projection.properties.carrier]
type = "string"
pattern = "^[^/\\\\]+$"

["$defs".projection.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"

["$defs".projection.properties.fragments]
type = "array"
minItems = 1
uniqueItems = true

["$defs".projection.properties.fragments.items]
"$ref" = "#/$defs/fragment"

["$defs".record]
type = "object"
required = ["id", "source", "projections"]
additionalProperties = false

["$defs".record.properties]

["$defs".record.properties.id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

["$defs".record.properties.source]
"$ref" = "#/$defs/identity"

["$defs".record.properties.projections]
type = "array"
minItems = 1
uniqueItems = true

["$defs".record.properties.projections.items]
"$ref" = "#/$defs/projection"
