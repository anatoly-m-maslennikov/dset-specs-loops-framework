"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/02_gov/schemas/conflict-candidate.schema.toml"
title = "DSET governed conflict candidate"
type = "object"
required = ["left", "right", "context"]
additionalProperties = false

[properties]

[properties.left]
"$ref" = "#/$defs/party"

[properties.right]
"$ref" = "#/$defs/party"

[properties.context]
type = "object"
required = ["applicable", "same_scope", "same_concern", "same_effective_time", "evidence"]
additionalProperties = false

[properties.context.properties]

[properties.context.properties.applicable]
type = "boolean"

[properties.context.properties.same_scope]
type = "boolean"

[properties.context.properties.same_concern]
type = "boolean"

[properties.context.properties.same_effective_time]
type = "boolean"

[properties.context.properties.evidence]
type = "array"
minItems = 1
uniqueItems = true

[properties.context.properties.evidence.items]
"$ref" = "#/$defs/identity"

[properties.relation]
enum = ["none", "source_projection", "absorption"]

[properties.relation_winner]
"$ref" = "#/$defs/id"

[properties.selectable]
type = "boolean"

[properties.precedence]
"$ref" = "#/$defs/id"

[properties.conflict_atom]
"$ref" = "#/$defs/conflict_atom"

["$defs"]

["$defs".id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

["$defs".identity]
type = "object"
required = ["carrier", "sha256"]
additionalProperties = false

["$defs".identity.properties]

["$defs".identity.properties.carrier]
type = "string"
pattern = "^[^/\\\\]+$"

["$defs".identity.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"

["$defs".priority]
type = "string"
minLength = 1

["$defs".party]
type = "object"
required = ["id"]
additionalProperties = false

["$defs".party.properties]

["$defs".party.properties.id]
"$ref" = "#/$defs/id"

["$defs".party.properties.source]
"$ref" = "#/$defs/identity"

["$defs".party.properties.role]
enum = ["atomic_authority", "evergreen_projection", "external_authority", "implementation", "qa", "evidence", "verification", "readiness", "derived_view"]

["$defs".party.properties.priority]
"$ref" = "#/$defs/priority"

["$defs".party.properties.priority_source]
type = "string"
minLength = 1

["$defs".party.properties.immutable]
type = "boolean"

["$defs".party.properties.external]
type = "boolean"

["$defs".party.properties.scope]
"$ref" = "#/$defs/scope"

["$defs".party.properties.current_status]
type = "string"
minLength = 1

["$defs".scope]
type = "object"
required = ["kind", "id"]
additionalProperties = false

["$defs".scope.properties]

["$defs".scope.properties.kind]
type = "string"
minLength = 1

["$defs".scope.properties.id]
type = "string"
minLength = 1

["$defs".conflict_atom]
type = "object"
required = ["artifact_id", "semantic_id", "authority", "claim", "scope", "llm_session_ids", "material_links", "promotion", "acceptance", "priority", "lineage"]
additionalProperties = false

["$defs".conflict_atom.properties]

["$defs".conflict_atom.properties.artifact_id]
"$ref" = "#/$defs/id"

["$defs".conflict_atom.properties.semantic_id]
"$ref" = "#/$defs/id"

["$defs".conflict_atom.properties.authority]
type = "string"
minLength = 1

["$defs".conflict_atom.properties.claim]
type = "string"
minLength = 1

["$defs".conflict_atom.properties.type]
const = "question"

["$defs".conflict_atom.properties.subtype]
const = "conflict"

["$defs".conflict_atom.properties.scope]
"$ref" = "#/$defs/scope"

["$defs".conflict_atom.properties.llm_session_ids]
type = "array"
uniqueItems = true

["$defs".conflict_atom.properties.llm_session_ids.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9._:-]+$"

["$defs".conflict_atom.properties.material_links]
type = "array"
minItems = 2
maxItems = 2
uniqueItems = true

["$defs".conflict_atom.properties.material_links.items]
"$ref" = "#/$defs/id"

["$defs".conflict_atom.properties.promotion]
type = "object"

["$defs".conflict_atom.properties.acceptance]
enum = ["proposed", "accepted"]

["$defs".conflict_atom.properties.priority]
"$ref" = "#/$defs/priority"

["$defs".conflict_atom.properties.lineage]
type = "array"
minItems = 2
maxItems = 2
uniqueItems = true

["$defs".conflict_atom.properties.lineage.items]
"$ref" = "#/$defs/id"

["$defs".conflict_atom.properties.rationale]
type = "string"
minLength = 1
maxLength = 4096

["$defs".conflict_atom.properties.boundary]
type = "string"
minLength = 1

["$defs".conflict_atom.properties.conflict_state]
type = "string"
minLength = 1

["$defs".conflict_atom.properties.verification_obligation]
type = "string"
minLength = 1

["$defs".conflict_atom.properties.unknowns]
type = "array"
