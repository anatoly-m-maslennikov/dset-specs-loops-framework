"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/02_gov/schemas/review-report.schema.toml"
title = "DSET external review report frontmatter"
type = "object"
required = ["schema_version", "artifact_type", "artifact_subtype", "artifact_id", "packet_id", "priority", "reviewer", "llm_session_ids", "reviewed_commit", "reviewed_inputs", "method", "observed_at", "limitations", "findings"]
additionalProperties = false

[properties]

[properties.schema_version]
const = "1.0"

[properties.artifact_type]
const = "evidence_record"

[properties.artifact_subtype]
const = "review_report"

[properties.artifact_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-EVIDENCE-RECORD-[0-9]{3,}$"

[properties.packet_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-REVIEW-PACKET-[0-9]{3,}$"

[properties.priority]
type = "string"
minLength = 1

[properties.reviewer]
type = "object"
required = ["identity", "host", "model", "tool_version"]
additionalProperties = false

[properties.reviewer.properties]

[properties.reviewer.properties.identity]
type = "string"
minLength = 1

[properties.reviewer.properties.host]
type = "string"
minLength = 1

[properties.reviewer.properties.model]
type = "string"
minLength = 1

[properties.reviewer.properties.tool_version]
type = "string"
minLength = 1

[properties.llm_session_ids]
type = "array"
uniqueItems = true

[properties.llm_session_ids.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9._:-]+$"

[properties.reviewed_commit]
type = "string"
pattern = "^[0-9a-f]{40}$"

[properties.reviewed_inputs]
type = "array"
minItems = 1
uniqueItems = true

[properties.reviewed_inputs.items]
"$ref" = "#/$defs/input"

[properties.method]
type = "string"
minLength = 1

[properties.observed_at]
type = "string"
format = "date-time"

[properties.limitations]
type = "array"

[properties.limitations.items]
type = "string"
minLength = 1

[properties.findings]
type = "array"
uniqueItems = true

[properties.findings.items]
"$ref" = "#/$defs/finding"

["$defs"]

["$defs".input]
type = "object"
required = ["carrier", "sha256"]
additionalProperties = false

["$defs".input.properties]

["$defs".input.properties.carrier]
type = "string"
pattern = "^[^/\\\\]+$"

["$defs".input.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"

["$defs".finding]
type = "object"
required = ["id", "priority", "evidence", "confidence", "impact", "proposed_disposition"]
additionalProperties = false

["$defs".finding.properties]

["$defs".finding.properties.id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-REVIEW-FINDING-[0-9]{3,}$"

["$defs".finding.properties.priority]
type = "string"
minLength = 1

["$defs".finding.properties.evidence]
type = "string"
minLength = 1

["$defs".finding.properties.confidence]
enum = ["low", "medium", "high"]

["$defs".finding.properties.impact]
type = "string"
minLength = 1

["$defs".finding.properties.proposed_disposition]
enum = ["reject", "defer", "route_problem", "route_question", "route_decision", "route_change", "route_evergreen", "route_proof"]
