"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/02_gov/schemas/governance.schema.toml"
title = "DSET repository-governance registry"
type = "object"
required = ["schema_version", "profile", "rules", "workflows", "wrappers"]
additionalProperties = false

[properties]

[properties.schema_version]
const = 1.1

[properties.profile]
type = "object"
required = ["id", "version", "customization"]
additionalProperties = false

[properties.profile.properties]

[properties.profile.properties.id]
type = "string"
pattern = "^[a-z0-9]+(?:-[a-z0-9]+)*$"

[properties.profile.properties.version]
type = "string"
minLength = 1

[properties.profile.properties.customization]
enum = ["unmodified", "custom"]

[properties.rules]
type = "array"
minItems = 1

[properties.rules.items]
"$ref" = "#/$defs/rule"

[properties.workflows]
type = "array"
minItems = 1

[properties.workflows.items]
"$ref" = "#/$defs/workflow"

[properties.wrappers]
type = "array"

[properties.wrappers.items]
"$ref" = "#/$defs/wrapper"

["$defs"]

["$defs".rule]
type = "object"
required = ["id", "layer", "document", "owner", "applicability", "reason", "depends_on", "precedence_over", "customization", "source"]
additionalProperties = false

["$defs".rule.properties]

["$defs".rule.properties.id]
type = "string"
pattern = "^[A-Z0-9]+(?:-[A-Z0-9]+)+$"

["$defs".rule.properties.layer]
enum = ["META", "GOV", "TOOL", "SKILL", "IMPL", "OPS"]

["$defs".rule.properties.document]
type = "string"
pattern = "^[^/\\\\]+$"

["$defs".rule.properties.owner]
type = "string"
minLength = 1

["$defs".rule.properties.applicability]
enum = ["applicable", "not-applicable"]

["$defs".rule.properties.reason]
type = "string"
minLength = 1

["$defs".rule.properties.depends_on]
type = "array"
uniqueItems = true

["$defs".rule.properties.depends_on.items]
type = "string"

["$defs".rule.properties.precedence_over]
type = "array"
uniqueItems = true

["$defs".rule.properties.precedence_over.items]
type = "string"

["$defs".rule.properties.customization]
enum = ["unmodified", "custom"]

["$defs".rule.properties.source]
type = "object"
required = ["profile", "version", "template", "sha256"]
additionalProperties = false

["$defs".rule.properties.source.properties]

["$defs".rule.properties.source.properties.profile]
type = "string"
minLength = 1

["$defs".rule.properties.source.properties.version]
type = "string"
minLength = 1

["$defs".rule.properties.source.properties.template]
type = "string"
minLength = 1

["$defs".rule.properties.source.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"

["$defs".workflow]
type = "object"
required = ["id", "rules"]
additionalProperties = false

["$defs".workflow.properties]

["$defs".workflow.properties.id]
type = "string"
pattern = "^[a-z0-9]+(?:-[a-z0-9]+)*$"

["$defs".workflow.properties.rules]
type = "array"
minItems = 1
uniqueItems = true

["$defs".workflow.properties.rules.items]
type = "string"

["$defs".wrapper]
type = "object"
required = ["workflow", "skill", "sha256"]
additionalProperties = false

["$defs".wrapper.properties]

["$defs".wrapper.properties.workflow]
type = "string"
minLength = 1

["$defs".wrapper.properties.skill]
type = "string"
pattern = "^[a-z0-9]+(?:-[a-z0-9]+)*$"

["$defs".wrapper.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"
