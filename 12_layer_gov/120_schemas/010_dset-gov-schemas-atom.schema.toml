"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/02_gov/schemas/atom.schema.toml"
title = "DSET semantic atom frontmatter"
type = "object"
required = ["artifact_type", "artifact_id", "type", "semantic_id", "status", "priority", "authority", "claim", "scope", "promotion", "llm_session_ids"]
additionalProperties = false

[properties]

[properties.artifact_type]
const = "atomic_record"

[properties.artifact_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-ATOMIC-RECORD-[0-9]{3,}$"

[properties.type]
enum = ["decision", "question", "problem", "qa"]

[properties.subtype]
enum = ["requirement", "constraint", "contract", "implementation_decision", "conflict", "risk", "opportunity", "defect", "gap", "debt", "test_plan", "evaluation_plan"]

[properties.semantic_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

[properties.status]
enum = ["proposed", "accepted"]

[properties.priority]
type = "string"
minLength = 1

[properties.authority]
type = "string"
pattern = "^(operator|repository|external):[A-Za-z0-9._:-]+$"

[properties.claim]
type = "string"
minLength = 1

[properties.scope]
type = "object"
required = ["kind", "id"]
additionalProperties = false

[properties.scope.properties]

[properties.scope.properties.kind]
enum = ["project", "layer", "feature_group", "feature"]

[properties.scope.properties.id]
type = "string"
minLength = 1

[properties.promotion]
type = "object"
required = ["parent_scope"]
additionalProperties = false

[properties.promotion.properties]

[properties.promotion.properties.parent_scope]

[[properties.promotion.properties.parent_scope.oneOf]]
type = "null"

[[properties.promotion.properties.parent_scope.oneOf]]
type = "object"
required = ["kind", "id"]
additionalProperties = false

[properties.promotion.properties.parent_scope.oneOf.properties]

[properties.promotion.properties.parent_scope.oneOf.properties.kind]
enum = ["project", "feature_group"]

[properties.promotion.properties.parent_scope.oneOf.properties.id]
type = "string"
minLength = 1

[properties.promotion.properties.applies_unchanged]
type = "boolean"

[properties.promotion.properties.local_context_required]
type = "boolean"

[properties.promotion.properties.affected_children]
type = "array"
uniqueItems = true

[properties.promotion.properties.affected_children.items]
type = "string"
minLength = 1

[properties.promotion.properties.disposition]
enum = ["keep_local", "promote"]

[properties.relations]
type = "array"
minItems = 1

[properties.relations.items]
"$ref" = "#/$defs/relation"

[properties.child_of]
type = "array"
minItems = 1
uniqueItems = true

[properties.child_of.items]
"$ref" = "#/$defs/id"

[properties.llm_session_ids]
type = "array"
uniqueItems = true

[properties.llm_session_ids.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9._:-]+$"

[properties.rationale]
type = "string"
minLength = 1
maxLength = 4096

[properties.boundary]
type = "string"
minLength = 1

[properties.lineage]
type = "array"
uniqueItems = true

[properties.lineage.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

[properties.conflict_state]
enum = ["clear", "unresolved"]

[properties.verification_obligation]
type = "string"
minLength = 1

[properties.unknowns]
type = "array"

["$defs"]

["$defs".id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

["$defs".relation_type]
enum = ["child_of", "analysis_of", "projection_of", "implementation_of", "check_of", "evidence_for", "resolution_of", "override_of", "replacement_of", "relates_to"]

["$defs".relation]

[["$defs".relation.oneOf]]
type = "object"
required = ["type", "target"]
additionalProperties = false

["$defs".relation.oneOf.properties]

["$defs".relation.oneOf.properties.type]
"$ref" = "#/$defs/relation_type"

["$defs".relation.oneOf.properties.target]
"$ref" = "#/$defs/id"

[["$defs".relation.oneOf]]
type = "object"
required = ["type", "range"]
additionalProperties = false

["$defs".relation.oneOf.properties]

["$defs".relation.oneOf.properties.type]
const = "projection_of"

["$defs".relation.oneOf.properties.range]
"$ref" = "#/$defs/projection_range"

["$defs".projection_range]
type = "object"
required = ["semantic_type", "scope", "through"]
additionalProperties = false

["$defs".projection_range.properties]

["$defs".projection_range.properties.semantic_type]
enum = ["decision", "question", "problem", "qa"]

["$defs".projection_range.properties.subtype]
enum = ["none", "requirement", "constraint", "contract", "implementation_decision", "conflict", "risk", "opportunity", "defect", "gap", "debt", "test_plan", "evaluation_plan"]

["$defs".projection_range.properties.layer]
enum = ["meta", "gov", "tool", "skill", "implementation", "ops"]

["$defs".projection_range.properties.scope]
type = "object"
required = ["kind", "id"]
additionalProperties = false

["$defs".projection_range.properties.scope.properties]

["$defs".projection_range.properties.scope.properties.kind]
enum = ["project", "layer", "feature_group", "feature"]

["$defs".projection_range.properties.scope.properties.id]
type = "string"
minLength = 1

["$defs".projection_range.properties.through]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-ATOMIC-RECORD-[0-9]{3,}$"

[[allOf]]

[allOf.if]
required = ["type"]

[allOf.if.properties]

[allOf.if.properties.type]
const = "qa"

[allOf.then]
required = ["subtype"]

[allOf.then.properties]

[allOf.then.properties.subtype]
enum = ["test_plan", "evaluation_plan"]

[[allOf]]

[allOf.if]
required = ["type", "subtype"]

[allOf.if.properties]

[allOf.if.properties.type]
const = "decision"

[allOf.then]

[allOf.then.properties]

[allOf.then.properties.subtype]
enum = ["requirement", "constraint", "contract", "implementation_decision"]

[[allOf]]

[allOf.if]
required = ["type", "subtype"]

[allOf.if.properties]

[allOf.if.properties.type]
const = "question"

[allOf.then]

[allOf.then.properties]

[allOf.then.properties.subtype]
enum = ["conflict", "risk", "opportunity"]

[[allOf]]

[allOf.if]
required = ["type", "subtype"]

[allOf.if.properties]

[allOf.if.properties.type]
const = "problem"

[allOf.then]

[allOf.then.properties]

[allOf.then.properties.subtype]
enum = ["defect", "gap", "debt"]

[[allOf]]

[allOf.not]
required = ["relations", "child_of"]
