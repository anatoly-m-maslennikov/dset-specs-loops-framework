"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/02_gov/schemas/atom.schema.toml"
title = "DSET routed atomic artifact frontmatter"
type = "object"
required = ["artifact_id", "semantic_id", "revision_mode", "content_role", "governance_origin", "relation_shape", "scope_path", "status", "priority", "authority", "claim", "promotion", "llm_session_ids"]
additionalProperties = false

[properties]

[properties.artifact_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-ATOMIC-RECORD-[0-9]{3,}$"

[properties.semantic_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

[properties.revision_mode]
const = "atomic"

[properties.content_role]
enum = ["inquiry", "definition", "rationale", "method", "implementation", "observation"]

[properties.governance_origin]
enum = ["internal", "external"]

[properties.relation_shape]
enum = ["standalone", "relational"]

[properties.scope_path]
type = "array"
minItems = 1
uniqueItems = true

[properties.scope_path.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9][A-Za-z0-9._-]*$"

[properties.relation_kind]
type = "string"
pattern = "^[a-z][a-z0-9]*(?:_[a-z0-9]+)*$"

[properties.endpoints]
type = "array"
minItems = 2

[properties.endpoints.items]
type = "object"
required = ["role", "target", "origin"]
additionalProperties = false

[properties.endpoints.items.properties]

[properties.endpoints.items.properties.role]
type = "string"
pattern = "^[a-z][a-z0-9]*(?:_[a-z0-9]+)*$"

[properties.endpoints.items.properties.target]
"$ref" = "#/$defs/id"

[properties.endpoints.items.properties.origin]
enum = ["internal", "external"]

[properties.status]
enum = ["proposed", "accepted"]

[properties.priority]
type = "string"
minLength = 1

[properties.authority]
type = "string"
pattern = "^(operator|repository|external):[A-Za-z0-9._:-]+$"

[properties.claim]
type = "string"
minLength = 1

[properties.promotion]
type = "object"
required = ["parent_scope"]
additionalProperties = false

[properties.promotion.properties]

[properties.promotion.properties.parent_scope]

[[properties.promotion.properties.parent_scope.oneOf]]
type = "null"

[[properties.promotion.properties.parent_scope.oneOf]]
type = "object"
required = ["kind", "id"]
additionalProperties = false

[properties.promotion.properties.parent_scope.oneOf.properties]

[properties.promotion.properties.parent_scope.oneOf.properties.kind]
enum = ["project", "feature_group"]

[properties.promotion.properties.parent_scope.oneOf.properties.id]
type = "string"
minLength = 1

[properties.promotion.properties.applies_unchanged]
type = "boolean"

[properties.promotion.properties.local_context_required]
type = "boolean"

[properties.promotion.properties.affected_children]
type = "array"
uniqueItems = true

[properties.promotion.properties.affected_children.items]
type = "string"
minLength = 1

[properties.promotion.properties.disposition]
enum = ["keep_local", "promote"]

[properties.relations]
type = "array"
minItems = 1

[properties.relations.items]
"$ref" = "#/$defs/relation"

[properties.child_of]
type = "array"
minItems = 1
uniqueItems = true

[properties.child_of.items]
"$ref" = "#/$defs/id"

[properties.llm_session_ids]
type = "array"
uniqueItems = true

[properties.llm_session_ids.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9._:-]+$"

[properties.rationale]
type = "string"
minLength = 1
maxLength = 4096

[properties.boundary]
type = "string"
minLength = 1

[properties.lineage]
type = "array"
uniqueItems = true

[properties.lineage.items]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

[properties.conflict_state]
enum = ["clear", "unresolved"]

[properties.verification_obligation]
type = "string"
minLength = 1

[properties.unknowns]
type = "array"

["$defs"]

["$defs".id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

["$defs".relation_type]
enum = ["child_of", "analysis_of", "projection_of", "implementation_of", "check_of", "evidence_for", "resolution_of", "override_of", "replacement_of", "recurrence_of", "relates_to"]

["$defs".relation]

[["$defs".relation.oneOf]]
type = "object"
required = ["type", "target"]
additionalProperties = false

["$defs".relation.oneOf.properties]

["$defs".relation.oneOf.properties.type]
"$ref" = "#/$defs/relation_type"

["$defs".relation.oneOf.properties.target]
"$ref" = "#/$defs/id"

[["$defs".relation.oneOf]]
type = "object"
required = ["type", "range"]
additionalProperties = false

["$defs".relation.oneOf.properties]

["$defs".relation.oneOf.properties.type]
const = "projection_of"

["$defs".relation.oneOf.properties.range]
"$ref" = "#/$defs/projection_range"

["$defs".projection_range]
type = "object"
required = ["revision_mode", "content_role", "governance_origin", "relation_shape", "scope_path", "through"]
additionalProperties = false

["$defs".projection_range.properties]

["$defs".projection_range.properties.revision_mode]
enum = ["atomic", "evergreen", "maintained"]

["$defs".projection_range.properties.content_role]
enum = ["inquiry", "definition", "rationale", "method", "implementation", "observation"]

["$defs".projection_range.properties.governance_origin]
enum = ["internal", "external"]

["$defs".projection_range.properties.relation_shape]
enum = ["standalone", "relational"]

["$defs".projection_range.properties.scope_path]
type = "array"
minItems = 1
uniqueItems = true

["$defs".projection_range.properties.scope_path.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9][A-Za-z0-9._-]*$"

["$defs".projection_range.properties.through]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-ATOMIC-RECORD-[0-9]{3,}$"

[[allOf]]

[allOf.if]
required = ["relation_shape"]

[allOf.if.properties]

[allOf.if.properties.relation_shape]
const = "relational"

[allOf.then]
required = ["relation_kind", "endpoints"]

[[allOf]]

[allOf.not]
required = ["relations", "child_of"]
