"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/12_layer_gov/120_schemas/010_dset-gov-schemas-atom.schema.toml"
title = "DSET atomic Markdown YAML property data"
description = "Base schema for the YAML property block of a DSET atomic Markdown artifact. Registered type routes are derived and never repeated in the carrier."
type = "object"
required = [
  "artifact_type",
  "artifact_id",
  "scope_path",
  "priority",
  "llm_session_ids",
]
additionalProperties = true

[properties]
revision_mode = false
content_role = false
governance_locus = false
governance_origin = false
relation_shape = false
semantic_id = false
status = false
authority = false
claim = false
worktree_state = false

[properties.artifact_type]
"$ref" = "#/$defs/type_name"

[properties.artifact_subtype]
"$ref" = "#/$defs/type_name"

[properties.artifact_id]
"$ref" = "#/$defs/id"

[properties.scope_path]
type = "array"
minItems = 0
uniqueItems = true

[properties.scope_path.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9][A-Za-z0-9._-]*$"

[properties.priority]
enum = ["high", "medium", "low"]

[properties.llm_session_ids]
type = "array"
uniqueItems = true

[properties.llm_session_ids.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9._:-]+$"

[properties.relations]
type = "array"
minItems = 1

[properties.relations.items]
"$ref" = "#/$defs/relation"

[properties.source_refs]
type = "array"
minItems = 1
uniqueItems = true

[properties.source_refs.items]
type = "string"
minLength = 1

["$defs"]

["$defs".id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

["$defs".type_name]
type = "string"
pattern = "^[a-z][a-z0-9]*(?:_[a-z0-9]+)*$"

["$defs".relation_type]
enum = [
  "child_of",
  "analysis_of",
  "projection_of",
  "implementation_of",
  "check_of",
  "evidence_for",
  "resolution_of",
  "solution_for",
  "override_of",
  "replacement_of",
  "recurrence_of",
  "relates_to",
]

["$defs".relation]
type = "object"
required = ["type", "targets"]
additionalProperties = false

["$defs".relation.properties]

["$defs".relation.properties.type]
"$ref" = "#/$defs/relation_type"

["$defs".relation.properties.targets]
type = "array"
minItems = 1
uniqueItems = true

["$defs".relation.properties.targets.items]
"$ref" = "#/$defs/id"

["x-dset-type-routes".requirement]
revision_mode = "atomic"
content_role = "definition"
governance_locus = "internal"

["x-dset-type-routes".constraint]
revision_mode = "atomic"
content_role = "definition"
governance_locus = "external"

["x-dset-type-routes".contract]
revision_mode = "atomic"
content_role = "definition"
governance_locus = "relation"

["x-dset-type-routes".implementation_decision]
revision_mode = "atomic"
content_role = "method"
governance_locus = "internal"

["x-dset-type-routes".question]
revision_mode = "atomic"
content_role = "inquiry"
governance_locus = "internal"
allowed_subtypes = ["risk", "opportunity"]

["x-dset-type-routes".question.subtype_routes.conflict]
revision_mode = "atomic"
content_role = "inquiry"
governance_locus = "relation"

["x-dset-type-routes".problem]
revision_mode = "atomic"
content_role = "observation"
governance_locus = "internal"
allowed_subtypes = ["defect", "gap", "debt"]

["x-dset-type-routes".test_plan]
revision_mode = "atomic"
content_role = "method"
governance_locus = "internal"

["x-dset-type-routes".evaluation_plan]
revision_mode = "atomic"
content_role = "method"
governance_locus = "internal"

["x-dset-type-routes".rationale]
revision_mode = "atomic"
content_role = "rationale"
governance_locus = "internal"

["x-dset-type-routes".analysis_report]
revision_mode = "atomic"
content_role = "rationale"
governance_locus = "internal"
allowed_subtypes = [
  "solution_landscape",
  "root_cause_analysis",
  "proposal",
  "technical_investigation",
  "external_audit_analysis",
]

["x-dset-type-routes".evidence_record]
revision_mode = "atomic"
content_role = "observation"
governance_locus = "internal"
allowed_subtypes = [
  "test_result",
  "evaluation_result",
  "review_report",
  "run_record",
]
