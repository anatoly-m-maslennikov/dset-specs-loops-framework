"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/02_gov/schemas/evidence-record.schema.toml"
title = "DSET native Evidence Record TOML frontmatter"
type = "object"
required = ["schema_version", "artifact_type", "artifact_subtype", "artifact_id", "priority", "llm_session_ids", "subject", "producer", "method", "context", "evidence_location", "polarity", "currentness", "reopen_when", "relations"]
additionalProperties = false

[properties]

[properties.schema_version]
const = "1.0"

[properties.artifact_type]
const = "evidence_record"

[properties.artifact_subtype]
enum = ["test_result", "evaluation_result", "review_report", "run_record"]

[properties.artifact_id]
"$ref" = "#/$defs/id"

[properties.priority]
type = "string"
minLength = 1

[properties.llm_session_ids]
type = "array"
uniqueItems = true

[properties.llm_session_ids.items]
type = "string"
pattern = "^[a-z][a-z0-9_-]*:[A-Za-z0-9._:-]+$"

[properties.subject]
"$ref" = "#/$defs/subject"

[properties.producer]
"$ref" = "#/$defs/producer"

[properties.method]
"$ref" = "#/$defs/method"

[properties.context]
type = "array"
minItems = 1

[properties.context.items]
type = "string"
minLength = 1

[properties.observed_at]
type = "string"
format = "date-time"

[properties.validity_window]
"$ref" = "#/$defs/validity_window"

[properties.evidence_location]
type = "string"
minLength = 1

[properties.polarity]
enum = ["supports", "contradicts", "mixed", "inconclusive"]

[properties.currentness]
enum = ["current", "stale", "superseded"]

[properties.reopen_when]
type = "string"
minLength = 1

[properties.relations]
type = "array"
minItems = 1

[properties.relations.contains]
type = "object"
required = ["type", "target"]

[properties.relations.contains.properties]

[properties.relations.contains.properties.type]
const = "evidence_for"

[properties.relations.contains.properties.target]
"$ref" = "#/$defs/id"

[properties.relations.items]
"$ref" = "#/$defs/relation"

[properties.independent_producer]
type = "boolean"

[properties.rival_explanations]
type = "array"
minItems = 1

[properties.rival_explanations.items]
type = "string"
minLength = 1

[properties.limitations]
type = "array"
minItems = 1

[properties.limitations.items]
type = "string"
minLength = 1

[properties.rationale]
type = "string"
minLength = 1

["$defs"]

["$defs".id]
type = "string"
pattern = "^[A-Z0-9]+(?:-[A-Z0-9]+)+$"

["$defs".subject]
type = "object"
required = ["id", "revision", "intended_use"]
additionalProperties = false

["$defs".subject.properties]

["$defs".subject.properties.id]
"$ref" = "#/$defs/id"

["$defs".subject.properties.revision]
type = "string"
minLength = 1

["$defs".subject.properties.revision.not]
const = "pending"

["$defs".subject.properties.intended_use]
type = "string"
minLength = 1

["$defs".producer]
type = "object"
required = ["identity", "performed_work"]
additionalProperties = false

["$defs".producer.properties]

["$defs".producer.properties.identity]
type = "string"
minLength = 1

["$defs".producer.properties.performed_work]
type = "string"
minLength = 1

["$defs".method]
type = "object"
required = ["description", "setup"]
additionalProperties = false

["$defs".method.properties]

["$defs".method.properties.description]
type = "string"
minLength = 1

["$defs".method.properties.setup]
type = "string"
minLength = 1

["$defs".validity_window]
type = "object"
required = ["from", "through"]
additionalProperties = false

["$defs".validity_window.properties]

["$defs".validity_window.properties.from]
type = "string"
format = "date-time"

["$defs".validity_window.properties.through]
type = "string"
format = "date-time"

["$defs".relation]
type = "object"
required = ["type", "target"]
additionalProperties = false

["$defs".relation.properties]

["$defs".relation.properties.type]
enum = ["child_of", "analysis_of", "projection_of", "implementation_of", "check_of", "evidence_for", "resolution_of", "override_of", "replacement_of", "relates_to"]

["$defs".relation.properties.target]
"$ref" = "#/$defs/id"

[[oneOf]]
required = ["observed_at"]

[oneOf.not]
required = ["validity_window"]

[[oneOf]]
required = ["validity_window"]

[oneOf.not]
required = ["observed_at"]
