"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/02_gov/schemas/provenance.schema.toml"
title = "DSET provenance manifest"
type = "object"
required = ["schema_version", "project_license", "sources"]
additionalProperties = false

[properties]

[properties.schema_version]
const = 1.0

[properties.project_license]
type = "string"
minLength = 1

[properties.sources]
type = "array"

[properties.sources.items]
type = "object"
required = ["id", "repository", "revision", "license", "license_file", "use"]
additionalProperties = false

[properties.sources.items.properties]

[properties.sources.items.properties.id]
type = "string"

[properties.sources.items.properties.repository]
type = "string"
format = "uri"

[properties.sources.items.properties.revision]
type = "string"
pattern = "^[0-9a-f]{40}$"

[properties.sources.items.properties.license]
type = "string"

[properties.sources.items.properties.license_file]
type = "string"

[properties.sources.items.properties.use]
type = "string"

[properties.sources.items.properties.mappings]
type = "array"

[properties.sources.items.properties.mappings.items]
"$ref" = "#/$defs/mapping"

["$defs"]

["$defs".mapping]
type = "object"
required = ["pattern", "source", "source_lines", "dset_surface", "disposition", "adaptation_scope", "exclusions"]
additionalProperties = false

["$defs".mapping.properties]

["$defs".mapping.properties.pattern]
type = "string"
minLength = 1

["$defs".mapping.properties.source]
type = "string"
minLength = 1

["$defs".mapping.properties.source_lines]
type = "string"
pattern = "^[0-9,-]+$"

["$defs".mapping.properties.dset_surface]
type = "string"
minLength = 1

["$defs".mapping.properties.disposition]
enum = ["adopted", "adapted", "rejected"]

["$defs".mapping.properties.adaptation_scope]
type = "string"
minLength = 1

["$defs".mapping.properties.exclusions]
type = "array"
minItems = 1
uniqueItems = true

["$defs".mapping.properties.exclusions.items]
type = "string"
minLength = 1
