"$schema" = "https://json-schema.org/draft/2020-12/schema"
"$id" = "https://raw.githubusercontent.com/anatoly-m-maslennikov/dset-specs-loops-framework/main/.dset/000_dset_methodology/02_gov/schemas/review-packet.schema.toml"
title = "DSET external review packet frontmatter"
type = "object"
required = ["schema_version", "artifact_type", "artifact_id", "packet_id", "repository", "commit", "scope", "criteria", "reviewed_inputs", "resolved_rules", "allowed_effects"]
additionalProperties = false

[properties]

[properties.schema_version]
const = "1.0"

[properties.artifact_type]
const = "plan"

[properties.artifact_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-PLAN-[0-9]{3,}$"

[properties.packet_id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*-REVIEW-PACKET-[0-9]{3,}$"

[properties.repository]
type = "string"
minLength = 1

[properties.commit]
type = "string"
pattern = "^[0-9a-f]{40}$"

[properties.scope]
type = "string"
minLength = 1

[properties.criteria]
type = "array"
minItems = 1
uniqueItems = true

[properties.criteria.items]
type = "string"
minLength = 1

[properties.reviewed_inputs]
type = "array"
minItems = 1
uniqueItems = true

[properties.reviewed_inputs.items]
"$ref" = "#/$defs/input"

[properties.resolved_rules]
type = "array"
minItems = 1
uniqueItems = true

[properties.resolved_rules.items]
"$ref" = "#/$defs/rule"

[properties.allowed_effects]
const = ["read_only_report"]

["$defs"]

["$defs".input]
type = "object"
required = ["carrier", "sha256"]
additionalProperties = false

["$defs".input.properties]

["$defs".input.properties.carrier]
type = "string"
pattern = "^[^/\\\\]+$"

["$defs".input.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"

["$defs".rule]
type = "object"
required = ["id", "carrier", "sha256"]
additionalProperties = false

["$defs".rule.properties]

["$defs".rule.properties.id]
type = "string"
pattern = "^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)+$"

["$defs".rule.properties.carrier]
type = "string"
pattern = "^[^/\\\\]+$"

["$defs".rule.properties.sha256]
type = "string"
pattern = "^[0-9a-f]{64}$"
