name: DSET

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dset-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install locked development environment
        run: |
          python -m pip install uv==0.11.28
          uv sync --locked --dev

      - name: Run canonical DSET verification
        run: uv run dset verify .
