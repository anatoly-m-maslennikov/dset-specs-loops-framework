name: DSET WSL proof

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-wsl:
    name: DSET / validate (WSL)
    runs-on: [self-hosted, windows, x64, wsl]
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run canonical verification inside WSL
        shell: wsl.exe bash -e {0}
        run: |
          python3 -m pip install uv==0.11.28
          uv sync --locked --dev
          uv run dset verify .
